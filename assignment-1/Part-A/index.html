<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment Page</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        /* Header */
        header {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 12px;
            font-size: 24px;
            font-weight: bold;
        }

        /* Navigation */
        nav {
            background-color: #555;
            text-align: center;
            padding: 8px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 10px;
            font-size: 14px;
        }

        /* Main Content */
        main {
            padding: 15px 25px;
        }

        h3 {
            margin-bottom: 5px;
            margin-top: 15px;
        }

        p, li {
            font-size: 14px;
        }

        img {
            width: 180px;
            border-radius: 6px;
        }

        button {
            padding: 8px 12px;
            margin: 5px;
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }

        /* Font Style Example */
        .styled-text {
            color: darkred;
            font-style: italic;
            font-weight: bold;
            font-size: 16px;
        }

        ol, ul {
            margin-top: 5px;
        }

        /* Footer */
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 15px;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        My First Web Page
    </header>

    <!-- Navigation -->
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <!-- Main Content -->
    <main>

        <p class="styled-text">
            Welcome to my HTML assignment page!
        </p>

        <!-- Image -->
        <h3>Image</h3>
        <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?w=500"
             alt="Technology Image">

        <!-- Buttons -->
        <h3>Buttons</h3>
        <button>Click Me</button>
        <button>Submit</button>

        <!-- Anchor Tag -->
        <h3>Anchor Tag</h3>
        <p>
            Visit 
            <a href="https://www.google.com" target="_blank">Google</a>
        </p>

        <!-- Ordered List -->
        <h3>Ordered List</h3>
        <ol>
            <li>HTML</li>
            <li>CSS</li>
            <li>JavaScript</li>
        </ol>

        <!-- Unordered List -->
        <h3>Unordered List</h3>
        <ul>
            <li>Frontend</li>
            <li>Backend</li>
            <li>Database</li>
        </ul>

    </main>

    <!-- Footer -->
    <footer>
        © 2026 My Web Page
    </footer>

</body>
</html>
